<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Armário Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    
    <button id="btn-tema" class="btn-tema">🌙 Modo Escuro</button>

    <div id="tela-autenticacao" class="auth-container">
        <div class="auth-card">
            <h2 id="auth-titulo">Criar Conta no Smart Armário</h2>
            <p id="auth-subtitulo">Cadastre-se para começar a gerenciar seu estoque.</p>
            
            <form id="formulario-auth">
                <div class="row" id="auth-nome-container">
                    <div class="input-container">
                        <img src="/icones/usuario.png" class="input-icon" alt="Ícone de Usuário">
                        <input type="text" id="auth-nome" placeholder="Seu Nome Completo">
                    </div>
                </div>

                <div class="row">
                    <div class="input-container">
                        <img src="/icones/gmail.png" class="input-icon" alt="Ícone de E-mail">
                        <input type="email" id="auth-email" placeholder="Seu Melhor E-mail" required>
                    </div>
                </div>

                <div class="row">
                    <div class="input-container" style="position: relative; display: flex; align-items: center; width: 100%;">
                        <img src="/icones/senha.png" class="input-icon" alt="Ícone de Cadeado">
                        <input type="password" id="auth-senha" placeholder="Crie uma Senha" required style="flex: 1; padding-right: 40px;">
                        <button type="button" id="btn-mostrar-senha" style="position: absolute; right: 10px; background: none; border: none; cursor: pointer; font-size: 1.2em; z-index: 10;">👁️</button>
                    </div>
                </div>
    
                <div class="auth-botoes">
                    <button type="submit" id="btn-auth-principal" class="btn-primario">Cadastrar</button>
                    <button type="button" id="btn-auth-alternar" class="btn-secundario">Possui conta?</button>
                </div>
            </form>
        </div>
    </div>

    <div id="tela-sistema" class="container" style="display: none;">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>📦 Smart Armário Pro</h1>
            <div id="usuario-logado" style="font-size: 0.9em; color: #94a3b8;"></div>
        </header>

        <main>
            <section class="card">
                <h2>Novo Produto</h2>
                <form id="formulario-produto">
                    <div class="row">
                        <div style="flex: 1;">
                            <input type="text" id="nome" placeholder="Nome do Produto (Ex: Óleo)" required>
                        </div>
                        <div style="flex: 1;">
                            <input type="text" id="marca" placeholder="Marca (Ex: Liza)" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div style="flex: 1;">
                            <label class="label-pequena">Qtd. de Embalagens:</label>
                            <input type="number" id="quantidade" placeholder="Ex: 2" step="0.1" required>
                        </div>
                        <div style="flex: 1;">
                            <label class="label-pequena">Conteúdo por Embalagem:</label>
                            <input type="number" id="medida-unidade" placeholder="Ex: 900" required>
                        </div>
                        <div style="flex: 0.5;">
                            <label class="label-pequena">Unidade:</label>
                            <select id="unidade" required>
                                <option value="un">Unidade (un)</option>
                                <option value="ml">ml</option>
                                <option value="l">Litros (l)</option>
                                <option value="g">Gramas (g)</option>
                                <option value="kg">Quilos (kg)</option>
                            </select>
                        </div>
                    </div>

                    <div class="row" style="flex-direction: column; align-items: stretch;">
                        <label for="validade" style="font-size: 0.8em; margin-bottom: 5px; display: block; width: 100%;">Data de Validade:</label>
                        <input type="date" id="validade" style="width: 100%;" required>
                    </div>
                    
                    <button type="submit" class="btn-primario" style="margin-top: 10px;">Adicionar ao Armário</button>
                </form>
            </section>

            <div class="grid-layout">
                <section class="card">
                    <h2>📋 Meu Estoque</h2>
                    <div id="container-grafico" style="margin-bottom: 20px; height: 300px; display: none;">
                        <canvas id="graficoEstoque"></canvas>
                    </div>
                    <div id="lista-estoque" class="list-container"></div>
                </section>

                <section class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <h2>📉 Histórico</h2>
                        <button id="btn-limpar-historico" class="btn-limpar-tudo">Limpar Tudo</button>
                    </div>
                    <div id="lista-historico" class="list-container"></div>
                </section>
            </div>
        </main>
    </div>

    <div id="modalEditar" class="modal-container">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Editar Produto</h3>
                <span class="modal-fechar" onclick="fecharModalEditar()">&times;</span>
            </div>
            <form id="formEditarProduto" onsubmit="salvarEdicaoProduto(event)">
                <input type="hidden" id="edit-id">
                
                <div class="row">
                    <div style="flex: 1;">
                        <label class="label-pequena" for="edit-nome">Nome do Produto:</label>
                        <input type="text" id="edit-nome" required>
                    </div>
                    <div style="flex: 1;">
                        <label class="label-pequena" for="edit-marca">Marca:</label>
                        <input type="text" id="edit-marca" required>
                    </div>
                </div>

                <div class="row">
                    <div style="flex: 1;">
                        <label class="label-pequena" for="edit-qtd-embalagens">Qtd. de Embalagens:</label>
                        <input type="number" id="edit-qtd-embalagens" min="0.1" step="0.1" required>
                    </div>
                    <div style="flex: 1;">
                        <label class="label-pequena" for="edit-medida">Conteúdo por Embalagem:</label>
                        <input type="number" id="edit-medida" step="any" required>
                    </div>
                    <div style="flex: 0.5;">
                        <label class="label-pequena" for="edit-tipo">Unidade:</label>
                        <select id="edit-tipo" required>
                            <option value="un">Unidade (un)</option>
                            <option value="ml">ml</option>
                            <option value="l">Litros (l)</option>
                            <option value="g">Gramas (g)</option>
                            <option value="kg">Quilos (kg)</option>
                        </select>
                    </div>
                </div>

                <div class="row" style="flex-direction: column; align-items: stretch;">
                    <label for="edit-validade" style="font-size: 0.8em; margin-bottom: 5px; display: block; width: 100%;">Data de Validade:</label>
                    <input type="date" id="edit-validade" style="width: 100%;" required>
                </div>

                <button type="submit" class="btn-primario" style="margin-top: 15px; background-color: #10b981;">Salvar Alterações</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
