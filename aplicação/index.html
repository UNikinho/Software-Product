<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Armário Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 Smart Armário Pro</h1>
        </header>

        <main>
            <section class="card">
                <h2>Novo Produto</h2>
                <form id="formulario-produto">
                    <div class="row">
                        <input type="text" id="nome" placeholder="Nome do Produto (Ex: Óleo)" required>
                        <input type="text" id="marca" placeholder="Marca (Ex: Liza)" required>
                    </div>
                    
                    <div class="row">
                        <div style="flex: 1;">
                            <label class="label-pequena">Qtd. de Embalagens:</label>
                            <input type="number" id="quantidade" placeholder="Ex: 2" step="0.1" required>
                        </div>
                        <div style="flex: 1;">
                            <label class="label-pequena">Conteúdo por Embalagem:</label>
                            <input type="number" id="medida-unidade" placeholder="Ex: 900" required>
                        </div>
                        <div style="flex: 0.5;">
                            <label class="label-pequena">Unidade:</label>
                            <select id="unidade">
                                <option value="un">Unidade (un)</option>
                                <option value="ml">ml</option>
                                <option value="l">Litros (l)</option>
                                <option value="g">Gramas (g)</option>
                                <option value="kg">Quilos (kg)</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <label for="validade" style="font-size: 0.8em; margin-bottom: 5px; display: block;">Data de Validade:</label>
                    </div>
                    <input type="date" id="validade" required>
                    
                    <button type="submit" class="btn-primario">Adicionar ao Armário</button>
                </form>
            </section>

            <div class="grid-layout">
                <section class="card">
                    <h2>📋 Meu Estoque</h2>
                    <div id="container-grafico" style="margin-bottom: 20px; height: 300px; display: none;">
                        <canvas id="graficoEstoque"></canvas>
                    </div>
                    <div id="lista-estoque" class="list-container"></div>
                </section>

                <section class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <h2>📉 Histórico</h2>
                        <button id="btn-limpar-historico" class="btn-limpar-tudo">Limpar Tudo</button>
                    </div>
                    <div id="lista-historico" class="list-container"></div>
                </section>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
